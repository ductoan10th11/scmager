version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: scmager_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # 2. MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: scmager_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"     # API port
      - "9001:9001"     # Console port
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 3. Valkey (Redis Alternative for Cache & BullMQ)
  valkey:
    image: valkey/valkey:7.2
    container_name: scmager_valkey
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - valkey_data:/data

  # 4. Backend API Service (Development Mode)
  api:
    image: node:20-alpine
    container_name: scmager_api
    restart: unless-stopped
    working_dir: /app/apps/api
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=${MONGO_URI}
    volumes:
      - .:/app
    # Keep container running to allow docker compose exec
    command: tail -f /dev/null
    depends_on:
      - mongodb
      - valkey

  # 5. Frontend Web Service (Development Mode)
  web:
    image: node:20-alpine
    container_name: scmager_web
    restart: unless-stopped
    working_dir: /app/apps/web
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
    # Keep container running to allow docker compose exec
    command: tail -f /dev/null

volumes:
  mongodb_data:
  minio_data:
  valkey_data:
