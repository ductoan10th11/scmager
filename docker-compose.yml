version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: sc-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "8000:8000"
    command: --port 8000
    volumes:
      - mongodb_data:/data/db

  # 2. MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: sc-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    ports:
      - "8001:8001"     # API port
      - "8002:8002"     # Console port
    command: server /data --address ":8001" --console-address ":8002"
    volumes:
      - minio_data:/data

  # 3. Valkey (Redis Alternative for Cache & BullMQ)
  valkey:
    image: valkey/valkey:7.2
    container_name: sc-valkey
    restart: always
    ports:
      - "8003:8003"
    command: valkey-server --port 8003
    volumes:
      - valkey_data:/data

  # 4. Backend API Service (Development Mode)
  api:
    image: node:20-slim
    container_name: sc-api
    restart: unless-stopped
    working_dir: /app/apps/api
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=development
      - MONGO_URI=${MONGO_URI}
    volumes:
      - .:/app
    # Keep container running to allow docker compose exec
    command: tail -f /dev/null
    depends_on:
      - mongodb
      - valkey

  # 5. Frontend Web Service (Development Mode)
  web:
    image: node:20-slim
    container_name: sc-web
    restart: unless-stopped
    working_dir: /app/apps/web
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
    # Keep container running to allow docker compose exec
    command: tail -f /dev/null

volumes:
  mongodb_data:
  minio_data:
  valkey_data:
