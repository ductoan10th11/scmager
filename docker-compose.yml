services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: sc-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "8000:8000"
    command: --port 8000
    volumes:
      - mongodb_data:/data/db

  # 2. MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: sc-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    ports:
      - "8001:8001"     # API port
      - "8002:8002"     # Console port
    command: server /data --address ":8001" --console-address ":8002"
    volumes:
      - minio_data:/data

  # 3. Valkey (Redis Alternative for Cache & BullMQ)
  valkey:
    image: valkey/valkey:7.2
    container_name: sc-valkey
    restart: always
    ports:
      - "8003:8003"
    command: valkey-server --port 8003
    volumes:
      - valkey_data:/data

  # 4. Backend API Service
  api:
    image: node:20-slim
    container_name: sc-api
    restart: unless-stopped
    working_dir: /app/apps/api
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DOCUMENT_ASSIGN_USER_SLA_HOURS=${DOCUMENT_ASSIGN_USER_SLA_HOURS:-4}
      - SLA_MONITOR_INTERVAL_MS=${SLA_MONITOR_INTERVAL_MS:-300000}
      - WORK_TIMEZONE_OFFSET_MINUTES=${WORK_TIMEZONE_OFFSET_MINUTES:-420}
      - ASSIGNMENT_AI_URL=${ASSIGNMENT_AI_URL:-http://100.94.148.68:8000/v1/chat/completions}
      - ASSIGNMENT_AI_MODEL=${ASSIGNMENT_AI_MODEL:-qwen3.6-27b}
      - UPLOAD_DIR=/app/apps/api/uploads
    volumes:
      - .:/app
    command: sh -c "npm run build && npm run start"
    init: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8004/api/ping').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - mongodb
      - valkey

  # 5. Frontend Web Service
  web:
    image: node:20-slim
    container_name: sc-web
    restart: unless-stopped
    working_dir: /app/apps/web
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=production
    volumes:
      - .:/app
    command: sh -c "npm run build && npm run start"
    init: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8005').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mongodb_data:
  minio_data:
  valkey_data:
